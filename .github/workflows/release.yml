name: Release PaperFlow

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v6
      - name: Import Developer ID certificate
        env:
          CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security create-keychain -p actions "$RUNNER_TEMP/release.keychain-db"
          security unlock-keychain -p actions "$RUNNER_TEMP/release.keychain-db"
          security import "$RUNNER_TEMP/developer-id.p12" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$RUNNER_TEMP/release.keychain-db"
          security list-keychain -d user -s "$RUNNER_TEMP/release.keychain-db" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$RUNNER_TEMP/release.keychain-db"
      - name: Configure notarization
        run: xcrun notarytool store-credentials paperflow-actions --apple-id "${{ secrets.APPLE_ID }}" --team-id "${{ secrets.APPLE_TEAM_ID }}" --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
      - name: Verify, test, and package
        env:
          SIGNING_MODE: release
          DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          NOTARY_PROFILE: paperflow-actions
        run: |
          VERSION="$(python3 -c 'import pathlib,tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "v$VERSION"
          test -z "$(git status --porcelain)"
          uv sync --extra dev
          uv run pytest
          PaperFlowApp/build_app.sh
          cp gnaroshi.app.json PaperFlowApp/dist/gnaroshi.app.json
          (cd PaperFlowApp/dist && shasum -a 256 PaperFlow.zip PaperFlow.dmg gnaroshi.app.json > SHA256SUMS)
      - name: Publish release
        env: { GH_TOKEN: "${{ github.token }}" }
        run: gh release create "$GITHUB_REF_NAME" PaperFlowApp/dist/PaperFlow.zip PaperFlowApp/dist/PaperFlow.dmg PaperFlowApp/dist/gnaroshi.app.json PaperFlowApp/dist/SHA256SUMS --generate-notes --verify-tag

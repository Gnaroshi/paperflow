schema_version: "3.0"
name: "PaperFlow Taxonomy v3"

principles:
  - Collections represent where the paper belongs intellectually.
  - Tags represent methods, tasks, status, source, modality, and cleanup state.
  - Do not overload Datasets & Benchmarks.
  - Do not classify as RAG unless explicit retrieval is present.
  - Do not classify as VLM just because the paper contains "vision" and "language" in references.
  - If uncertain, use Review Queue with reasons.

assignment_policy:
  max_collection_depth: 4
  primary_area_collections_per_paper: 1
  secondary_area_or_resource_collections_per_paper:
    min: 0
    max: 2
  tags_per_paper:
    min: 5
    max: 15
  uncertain_collection: "AI Library/05 Review Queue"

classification_guards:
  rag:
    require_explicit_retrieval_signal: true
    positive_signals:
      - retrieval-augmented generation
      - retrieval augmented generation
      - RAG
      - retriever
      - document retrieval
      - passage retrieval
      - dense retrieval
      - indexing
      - knowledge-base retrieval
      - citation-grounded generation
      - query-document retrieval
    negative_rule: "Do not classify representation learning, robotics prediction, battery prediction, graph learning, or VLM prompt learning as RAG unless explicit retrieval is present."
  vlm:
    require_core_topic_signal: true
    negative_rule: "Do not classify as VLM just because vision-language terms appear only in references or related work."
  datasets_and_benchmarks:
    negative_rule: "Use Datasets or Benchmarks only when the paper's primary contribution is a dataset, benchmark, evaluation suite, or protocol."
  review_queue:
    use_when:
      - ambiguous classification
      - possible Zotero duplicate
      - new arXiv version
      - missing metadata
      - missing abstract
      - needs manual approval

